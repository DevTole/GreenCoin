<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenCoin | 404</title>

<style>
:root {
    --p:#2ecc71;
    --d:#2c3e50;
    --l:#f4f7f6;
    --w:#ffffff;
    --g:#95a5a6;
    --shadow:0 10px 30px rgba(0,0,0,0.05);
}

body{
    margin:0;
    font-family:Arial;
    background:var(--l);
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
}

.box{
    background:var(--w);
    padding:40px;
    border-radius:20px;
    box-shadow:var(--shadow);
    text-align:center;
    width:90%;
    max-width:400px;
}

h1{
    font-size:60px;
    margin:0;
    color:var(--p);
}

p{
    color:var(--g);
    margin:10px 0 20px;
}

a{
    display:inline-block;
    padding:12px 20px;
    background:var(--d);
    color:white;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
}
a:hover{
    background:var(--p);
}
</style>

</head>
<body>

<div class="box">
    <h1>404</h1>
    <p>Oops! This page does not exist on GreenCoin.</p>
    <a href="/">Go Home</a>
</div>

</body>
</html>
